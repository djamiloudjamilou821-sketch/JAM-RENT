<!DOCTYPE html>
<html>
<head>
    <title>Renters</title>
    <style>
        body {
            font-family: Arial;
            background:#f5f5f5;
            padding:20px;
        }

        table {
            width:100%;
            border-collapse: collapse;
            background:white;
        }

        th, td {
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }

        th {
            background:#333;
            color:white;
        }

        .late {
            color:red;
            font-weight:bold;
        }

        .ok {
            color:green;
            font-weight:bold;
        }

        .btn {
            padding:6px 10px;
            border-radius:5px;
            text-decoration:none;
            color:white;
            font-size:13px;
            margin-right:5px;
        }

        .view { background:#3498db; }
        .edit { background:orange; }
        .delete { background:red; }

    </style>
</head>

<body>

<h2>📋 Renters List</h2>
<a href="/dashboard" style="display:inline-block; margin-bottom:10px;  margin-left:10px;
    background:#2c3e50; color:white; padding:8px 12px;
    border-radius:6px; text-decoration:none;">
        ⬅ Back to Dashboard
    </a>

<table>

    <!-- HEADER -->
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Due</th>
        <th>Debt</th>
        <th>Actions</th>
    </tr>

    <!-- DATA -->
    {% for r in renters %}
    <tr>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ r[3] }}</td>

        <!-- DUE -->
        <td>{{ r[-2] }}</td>

        <!-- DEBT -->
        <td>
            {% if r[-1] > 0 %}
                <span class="late">{{ r[-1] }} CFA</span>
            {% else %}
                <span class="ok">0 CFA</span>
            {% endif %}
        </td>

        <!-- ACTIONS -->
        <td>
            <a href="/renter/{{ r[0] }}" class="btn view">View</a>
            <a href="/edit/{{ r[0] }}" class="btn edit">Edit</a>
            <a href="/delete/{{ r[0] }}" class="btn delete"
               onclick="return confirm('Delete this renter?')">
                Delete
            </a>
        </td>

    </tr>
    {% endfor %}

</table>

</body>
</html>
