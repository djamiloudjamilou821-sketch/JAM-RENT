<!DOCTYPE html>
<html>
<head>
    <title>Renter Timeline</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .paid {
            color: green;
            font-weight: bold;
        }

        .debt {
            color: red;
            font-weight: bold;
        }

        .header {
            margin-bottom: 15px;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .back {
            display: inline-block;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: black;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/renters" class="back">⬅ Back</a>

    <h2 class="header">📅 Rent Timeline - {{ renter[1] }}</h2>

    {% for t in timeline %}
    <div class="card">

        <div>
            Week {{ t.week }} <br>
            {{ t.start }}
        </div>

        <div>
            Paid: {{ t.paid }} CFA
        </div>

        <div>
            {% if t.status == "PAID" %}
                <span class="paid">PAID</span>
            {% else %}
                <span class="debt">DEBT</span>
            {% endif %}
        </div>

    </div>
    {% endfor %}

</div>

</body>
</html>
